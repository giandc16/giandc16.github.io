media:
  input: assets/img
  output: assets/img
  
content:
  - name: content
    label: Site Content
    type: file
    path: data/content.json
    fields:
      - name: about
        label: About
        type: object
        fields:
          - { name: bio, label: Bio, type: text }
      - name: skills
        label: Skills
        type: object
        list: true
        fields:
          - { name: title, label: Title, type: string }
          - { name: detail, label: Detail, type: string }
      - name: gallerySocial
        label: Social Media Gallery
        type: object
        list: true
        fields:
          - { name: image, label: Image, type: image }
          - { name: caption, label: Caption, type: string }
      - name: galleryWordpress
        label: WordPress Development Gallery
        type: object
        list: true
        fields:
          - { name: companyName, label: Company Name, type: string }
          - { name: logo, label: Company Logo, type: image }
          - name: screenshots
            label: Website Screenshots
            type: object
            list: true
            fields:
              - { name: image, label: Screenshot, type: image }
              - { name: caption, label: Page Caption / Label, type: string }
      - name: videos
        label: Videos
        type: object
        list: true
        fields:
          - { name: thumbnail, label: Thumbnail, type: image }
          - { name: title, label: Title, type: string }
          - { name: description, label: Description, type: text }
          - { name: embedIframe, label: Embed Iframe (leave blank if no video), type: text }
          - { name: playTitle, label: Play Button Title, type: string }

      - name: contactCards
        label: Contact Cards
        type: object
        list: true
        fields:
          - name: icon
            label: Icon (Font Awesome class)
            type: string
          - { name: label, label: Label, type: string }
          - { name: linkText, label: Link Display Text, type: string }
          - { name: url, label: URL, type: string }
