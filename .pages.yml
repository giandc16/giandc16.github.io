content:
  - name: content
    label: Site Content
    type: file
    path: data/content.json
    fields:
      - name: about
        label: About
        type: object
        fields:
          - { name: bio, label: Bio, type: text }
      - name: skills
        label: Skills
        type: object-list
        fields:
          - { name: title, label: Title, type: string }
          - { name: detail, label: Detail, type: string }
      - name: gallerySocial
        label: Social Media Gallery
        type: object-list
        fields:
          - { name: image, label: Image, type: image }
          - { name: caption, label: Caption, type: string }
      - name: galleryWordpress
        label: WordPress Development Gallery
        type: object-list
        fields:
          - { name: image, label: Image, type: image }
          - { name: link, label: Link, type: string }
          - { name: title, label: Title, type: string }
      - name: videos
        label: Videos
        type: object-list
        fields:
          - { name: thumbnail, label: Thumbnail, type: image }
          - { name: title, label: Title, type: string }
          - { name: description, label: Description, type: text }
          - { name: embedIframe, label: Embed Iframe (leave blank if no video), type: text }
          - { name: playTitle, label: Play Button Title, type: string }
